<div class="fp-root">
    <div class="bg-orb" aria-hidden="true"></div>

    <div class="fp-card" role="region" aria-labelledby="fp-title">
        <div class="top-illustration">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="12" fill="#7c3aed" opacity="0.12" />
                <path d="M9 12l2 2 4-4" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h2 id="fp-title">Forgot your password?</h2>
        <p class="muted">Enter your email and we'll send instructions to reset your password.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="form-grid">
            <label class="field">
                <span class="label">Email Address</span>
                <div class="input-wrap">
                    <input id="email" type="email" formControlName="email" placeholder="you@company.com" autocomplete="email" />
                    <span class="floating-icon" aria-hidden="true">📧</span>
                </div>

                <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="error-messages">
                    <div *ngIf="form.get('email')?.errors?.['required']">Email is required.</div>
                    <div *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email address.</div>
                </div>
            </label>

            <div class="actions">
                <button class="btn primary" type="submit" [disabled]="form.invalid || isLoading">
                    <span class="btn-text">{{ isLoading ? 'Sending...' : 'Send Reset Instructions' }}</span>
                    <span class="btn-ring" aria-hidden="true"></span>
                </button>

                <button class="btn ghost" (click)="navigateToLogin()" type="button" [disabled]="isLoading">
                    Back to Login
                </button>
            </div>
        </form>

        <div class="messages">
            <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
            <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>
        </div>
    </div>
</div>
