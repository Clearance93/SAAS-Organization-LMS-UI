<div class="rp-root">
    <div class="rp-card" role="region" aria-labelledby="rp-title">
        <h2 id="rp-title">Reset your password</h2>
        <p class="muted">Enter a new password below. The token was sent to your email; if the field are prefilled you can proceed</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <label class="field">
                <span class="label">Email</span>
                <input type="email" formControlName="email" placeholder="you@email.com" autocomplete="email" readonly />
            </label>

                        <label class="field">
                                <span class="label">Reset Token</span>
                                <div class="pw-wrap">
                                        <input [type]="showToken ? 'text' : 'password'" formControlName="token" placeholder="Enter your reset token" autocomplete="off"
                                            (copy)="preventClipboard($event)" (cut)="preventClipboard($event)" (paste)="preventClipboard($event)" />
                                        <button type="button" class="toggle-pw-btn" (click)="toggleShowToken()" [attr.aria-label]="showToken ? 'Hide token' : 'Show token'">
                                            {{ showToken ? 'Hide' : 'Show' }}
                                        </button>
                                </div>
                        </label>

            <label class="field">
                <span class="label">New Password</span>
                <div class="pw-wrap">
                    <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter your new password" autocomplete="new-password" />
                    <button type="button" class="toggle-pw-btn" (click)="toggleShowPassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                        {{ showPassword ? '🙈' : '👁️' }}
                    </button>
                </div>
            </label>

            <label class="field">
                <span class="label">Confirm New Password</span>
                    <div class="pw-wrap">
                    <input [type]="showPassword ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Confirm your new password" autocomplete="new-password" />
                </div>
            </label>

            <div class="actions">
                <button class="btn primary" type="submit" [disabled]="form.invalid || isLoading">
                    <span class="btn-text">{{ isLoading ? 'Resetting...' : 'Reset Password' }}</span>
                    <span class="btn-ring" aria-hidden="true"></span>
                </button>

                <button class="btn ghost" (click)="navigateToLogin()" type="button" [disabled]="isLoading">
                    Back to Login
                </button>
            </div>
        </form>

        <div class="message">
            <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
            <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>
        </div>
    </div>
</div>
